        border:state==='confirmed'?`2px solid ${isCp?'rgba(130,225,160,.9)':'rgba(140,220,195,.85)'}`:'none',
        position:'relative',zIndex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
        {method==='ray'&&<svg width={18} height={12} viewBox="0 0 18 12"><path d="M2,6 L14,6 M10,2 L14,6 L10,10" stroke={isCp?'#24484B':'#F5EDE0'} strokeWidth={2.2} fill="none" strokeLinecap="round"/></svg>}
        {method==='pinch'&&<svg width={14} height={12} viewBox="0 0 14 12"><path d="M1,2 L5,6 L1,10 Z M13,2 L9,6 L13,10 Z" fill={isCp?'#24484B':'#F5EDE0'}/></svg>}
        {method==='touch'&&<svg width={18} height={18} viewBox="0 0 18 18"><circle cx="9" cy="9" r="3.5" fill={isCp?'#24484B':'#F5EDE0'}/><circle cx="9" cy="9" r="7" stroke={isCp?'rgba(36,72,75,.7)':'rgba(245,237,224,.7)'} strokeWidth={1.3} fill="none"/></svg>}
      </div>
    </div>);

  // Crystal (placed/ghost) — small diamond prism
  const Crystal=({tone='warm',ghost=false})=>{
    const col=ghost?(isCp?['rgba(180,230,245,.5)','rgba(120,200,230,.5)','rgba(80,160,200,.5)']:['rgba(180,205,220,.55)','rgba(140,170,195,.5)','rgba(100,135,160,.5)']):(isCp?(tone==='warm'?['#FFE8A0','#FFCB5E','#B87830']:['#FFF5B8','#FFD97A','#C99040']):['#E8C0A0','#B57048','#5A2E18']);
    return (
      <svg width={50} height={70} viewBox="0 0 50 70">
        <ellipse cx={25} cy={64} rx={14} ry={4} fill="rgba(0,0,0,.22)"/>
        {ghost&&<defs><pattern id={`hatch-${tone}`} width={4} height={4} patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1={0} y1={0} x2={0} y2={4} stroke={isCp?'rgba(47,175,198,.4)':'rgba(160,200,220,.5)'} strokeWidth={1}/></pattern></defs>}
        <polygon points="25,6 44,26 25,60 6,26"
          fill={ghost?`url(#hatch-${tone})`:`url(#grad-${tone})`}
          stroke={ghost?(isCp?'rgba(47,175,198,.85)':'rgba(160,200,220,.9)'):'rgba(60,30,10,.35)'}
          strokeWidth={ghost?1.6:1}
          strokeDasharray={ghost?'4,4':''}/>
        {!ghost&&<defs><linearGradient id={`grad-${tone}`} x1={0} y1={0} x2={1} y2={1}><stop offset="0%" stopColor={col[0]}/><stop offset="50%" stopColor={col[1]}/><stop offset="100%" stopColor={col[2]}/></linearGradient></defs>}
        <line x1={25} y1={6} x2={25} y2={60} stroke={ghost?(isCp?'rgba(47,175,198,.85)':'rgba(160,200,220,.9)'):'rgba(255,252,220,.6)'} strokeWidth={1}/>
      </svg>);
  };

  // Waypoint marker
  const Waypoint=({step,final=false})=>{
    const col=final?(isCp?'#6DCFAA':'#7FD4B8'):(isCp?'#FFD166':'#E87664');
    const dark=final?(isCp?'#0D6A45':'#2A8A72'):(isCp?'#5A3F08':'#6B2A24');
    return (
      <svg width={72} height={68} viewBox="0 0 72 68">
        {[36,28,18].map((r,i)=>(
          <ellipse key={i} cx={36} cy={48} rx={r} ry={r*.3} fill="none" stroke={col} strokeWidth={i===0?2:1.4} opacity={0.72-0.18*i}/>
        ))}
        <ellipse cx={36} cy={46} rx={13} ry={4.5} fill={col}/>
        {final&&<>
          <line x1={36} y1={16} x2={36} y2={42} stroke={dark} strokeWidth={1.8}/>
          <polygon points="36,16 48,20 36,23" fill={col}/>
        </>}
        {!final&&<text x={36} y={50} textAnchor="middle" fontSize={12} fontWeight="bold" fill={dark} fontFamily="DM Mono,monospace">{step}</text>}
      </svg>);
  };

  // Oriented key (grabbed or ghost)
  const KeyCrystal=({ghost=false,rot=0})=>{
    const col=ghost?null:(isCp?['#FFE082','#FFF2B5','#E0B860','#C99040','#B87830']:['#D08860','#E8C0A0','#B57048','#6E3E28','#582E18']);
    const gCol=isCp?'rgba(47,175,198,.85)':'rgba(160,200,220,.9)';
    return (
      <svg width={60} height={90} viewBox="0 0 60 90" style={{transform:`rotate(${rot}deg)`}}>
        {!ghost&&<ellipse cx={30} cy={84} rx={16} ry={4.5} fill="rgba(0,0,0,.3)"/>}
        {/* head */}
        <polygon points="15,14 15,28 30,4 45,14 45,28"
          fill={ghost?'none':(isCp?'#FFE082':'#B57048')}
          stroke={ghost?gCol:(isCp?'rgba(180,110,40,.5)':'rgba(60,30,18,.4)')}
          strokeWidth={ghost?1.6:1}
          strokeDasharray={ghost?'4,4':''}/>
        {/* shaft */}
        <rect x={23} y={28} width={14} height={52}
          fill={ghost?'none':(isCp?'#D8A848':'#8A4E32')}
          stroke={ghost?gCol:'none'}
          strokeWidth={ghost?1.6:0}
          strokeDasharray={ghost?'4,4':''}/>
        {!ghost&&<line x1={30} y1={28} x2={30} y2={80} stroke="rgba(255,250,220,.5)" strokeWidth={1}/>}
        {/* UP indicator */}
        {ghost&&<>
          <line x1={30} y1={20} x2={30} y2={8} stroke={gCol} strokeWidth={1.6}/>
          <polyline points="26,12 30,8 34,12" stroke={gCol} strokeWidth={1.6} fill="none"/>
        </>}
        {!ghost&&<circle cx={30} cy={17} r={2.5} fill="rgba(255,252,230,.9)"/>}
      </svg>);
  };

  // Controller-ray aim reticle
  const RayReticle=()=>(
    <svg width={64} height={40} viewBox="0 0 64 40">
      <ellipse cx={32} cy={24} rx={22} ry={7} fill="none" stroke={isCp?'#E06456':'#E87864'} strokeWidth={1.8}/>
      <line x1={14} y1={24} x2={50} y2={24} stroke={isCp?'#E06456':'#E87864'} strokeWidth={1.5}/>
      <line x1={32} y1={16} x2={32} y2={32} stroke={isCp?'#E06456':'#E87864'} strokeWidth={1.5}/>
      <path d="M58,2 L32,20" stroke={isCp?'rgba(224,100,86,.55)':'rgba(232,120,100,.6)'} strokeWidth={1.6} strokeDasharray="5,4"/>
    </svg>);

  // Pinch-halo ring (from above)
  const PinchHalo=()=>(
    <svg width={60} height={36} viewBox="0 0 60 36">
      <ellipse cx={30} cy={26} rx={18} ry={5} fill="none" stroke={isCp?'rgba(47,175,198,.85)':'rgba(160,200,220,.9)'} strokeWidth={1.6} strokeDasharray="4,4"/>
      <polygon points="22,6 27,10 22,14" fill={isCp?'#2EAEC3':'#A8CBDE'}/>
      <polygon points="38,6 33,10 38,14" fill={isCp?'#2EAEC3':'#A8CBDE'}/>
      <line x1={30} y1={13} x2={30} y2={22} stroke={isCp?'rgba(47,175,198,.6)':'rgba(160,200,220,.7)'} strokeWidth={1} strokeDasharray="2,3"/>
    </svg>);

  const objects={
    selection:[
      {label:'Ray · idle',el:<TargetOrb col={isCp?'#C9A86C':'#8A7060'} state='idle' size={32} method='ray'/>},
      {label:'Pinch · targeted',el:<TargetOrb col={isCp?'#FFD166':'#E87664'} state='targeted' size={36} method='pinch'/>},
      {label:'Touch · confirmed',el:<TargetOrb col={isCp?'#6DCFAA':'#7FD4B8'} state='confirmed' size={30} method='touch'/>},
      {label:'Arch frame',el:<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}><MiniArch/><div style={{display:'flex',gap:8}}><MiniColumn/><MiniColumn/></div></div>},
    ],
    placement:[
      {label:'Surface quad',el:(
        <div style={{width:92,height:56,border:`1.5px solid ${isCp?'rgba(47,175,198,.6)':'rgba(130,154,162,.55)'}`,borderRadius:2,position:'relative',background:isCp?'rgba(47,175,198,.05)':'rgba(130,154,162,.05)'}}>
          {[1,2,3].map(i=><div key={i} style={{position:'absolute',left:`${i*25}%`,top:0,bottom:0,borderLeft:`1px solid ${isCp?'rgba(47,175,198,.3)':'rgba(130,154,162,.25)'}`}}/>)}
          <div style={{position:'absolute',top:'50%',left:0,right:0,borderTop:`1px solid ${isCp?'rgba(47,175,198,.25)':'rgba(130,154,162,.22)'}`}}/>
        </div>)},
      {label:'Placed crystal',el:<Crystal tone='warm'/>},
      {label:'Ghost preview',el:(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <PinchHalo/>
          <div style={{marginTop:-10}}><Crystal ghost/></div>
        </div>)},
      {label:'Controller ray',el:<RayReticle/>},
    ],
    locomotion:[
      {label:'Waypoint 1',el:<Waypoint step={1}/>},
      {label:'Waypoint 2',el:<Waypoint step={2}/>},
      {label:'Destination',el:<Waypoint step={3} final/>},
      {label:'Snap turn',el:(
        <svg width={76} height={56} viewBox="0 0 76 56" fill="none">
          <path d="M8,48 A36,36 0 0,1 68,48" stroke={isCp?'#FFD166':'#F4B97A'} strokeWidth="2.5" strokeLinecap="round"/>
          {[0,1,2,3,4].map(i=>{const a=Math.PI+(Math.PI/4)*i;const x=38+36*Math.cos(a);const y=48+36*Math.sin(a);const x2=38+42*Math.cos(a);const y2=48+42*Math.sin(a);return <line key={i} x1={x} y1={y} x2={x2} y2={y2} stroke={isCp?'rgba(255,209,102,.6)':'rgba(244,185,122,.6)'} strokeWidth={1.2}/>;})}
          <circle cx={68} cy={48} r={5} fill={isCp?'#FFD166':'#F4B97A'}/>
          <text x="38" y="34" textAnchor="middle" style={{fontSize:12,fill:isCp?'#7A5108':'#F4B97A',fontFamily:'DM Mono,monospace',fontWeight:'bold'}}>50°</text>
        </svg>)},
    ],
    manipulation:[
      {label:'Grabbed key',el:<div style={{transform:'rotate(-18deg)'}}><KeyCrystal/></div>},
      {label:'Target pose',el:(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <KeyCrystal ghost/>
          <svg width={46} height={14} viewBox="0 0 46 14"><ellipse cx={23} cy={7} rx={20} ry={5} fill="none" stroke={isCp?'rgba(47,175,198,.75)':'rgba(160,200,220,.75)'} strokeWidth={1.5} strokeDasharray="4,4"/></svg>
        </div>)},
      {label:'Dock slot',el:(
        <div style={{width:74,height:36,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{width:70,height:22,borderRadius:'50%',border:`1.5px dashed ${isCp?'rgba(255,209,102,.55)':'rgba(200,95,88,.52)'}`}}/>
          <div style={{position:'absolute',fontSize:8,fontWeight:600,color:isCp?'rgba(122,81,8,.65)':'rgba(244,160,122,.7)',textAlign:'center',top:'calc(100% + 4px)',whiteSpace:'nowrap'}}>SLOT 1</div>
        </div>)},
      {label:'Proximity ring',el:(
        <svg width={70} height={70} viewBox="0 0 70 70">
          <circle cx={35} cy={35} r={30} stroke={isCp?'rgba(255,209,102,.5)':'rgba(200,95,88,.5)'} strokeWidth={1.6} strokeDasharray="4,5" fill="none"/>
          <circle cx={35} cy={35} r={12} fill={`url(#grab-${isCp?'cp':'wn'})`}/>
          <defs><radialGradient id={`grab-${isCp?'cp':'wn'}`}><stop offset="0%" stopColor={isCp?'#FFF2B5':'#E8C0A0'}/><stop offset="100%" stopColor={isCp?'#C99040':'#8A4E32'}/></radialGradient></defs>
        </svg>)},
    ],
  };
  const items=objects[lab]||[];

  // Selection lab gets a dedicated 3×3 spec matrix (handoff asset) instead of the regular object row.
  const SelectionMatrix=()=>{
    const methods=[
      {id:'ray',label:'RAY',sub:'far · controller'},
      {id:'pinch',label:'PINCH',sub:'near · hand'},
      {id:'touch',label:'TOUCH',sub:'near · finger'},
    ];
    const states=[
      {id:'idle',label:'IDLE',hint:'default · dormant'},
      {id:'targeted',label:'TARGETED',hint:'hover · ready to confirm'},
      {id:'confirmed',label:'CONFIRMED',hint:'selection committed'},
    ];
    const stateColor=s=>s==='idle'?(isCp?'rgba(230,230,222,.55)':'rgba(220,200,180,.58)'):s==='targeted'?(isCp?'#FFD166':'#F4A07A'):(isCp?'#6DCFAA':'#7FD4B8');
    const baseCol=s=>s==='idle'?(isCp?'#C9A86C':'#6E5E50'):s==='targeted'?(isCp?'#FFD166':'#C85F58'):(isCp?'#6DCFAA':'#7FD4B8');
    const rowHeader=(m)=>(
      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',justifyContent:'center',paddingRight:12,borderRight:`1px solid ${isCp?'rgba(255,209,102,.18)':'rgba(200,95,88,.22)'}`}}>
        <div style={{fontSize:11,fontWeight:700,color:isCp?'#FFD166':'#F4A07A',letterSpacing:'.08em'}}>{m.label}</div>
        <div style={{fontSize:9.5,color:isCp?'rgba(230,230,222,.55)':'rgba(220,200,180,.55)',marginTop:2}}>{m.sub}</div>
      </div>);
    const cell=(m,s)=>{
      const col=baseCol(s.id);
      return (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,padding:'6px 4px'}}>
          <TargetOrb col={col} state={s.id} size={32} method={m.id}/>
          <div style={{fontSize:9,fontWeight:700,color:stateColor(s.id),letterSpacing:'.04em',textTransform:'uppercase',marginTop:-2}}>
            {s.id==='targeted'?'· targeting ·':s.id==='confirmed'?'✓ confirmed':'idle'}
          </div>
        </div>);
    };
    return (
      <div style={{padding:'16px 20px 18px',background:bg,borderRadius:'0 0 10px 10px'}}>
        {/* column headers */}
        <div style={{display:'grid',gridTemplateColumns:'88px repeat(3,1fr)',gap:6,marginBottom:6,paddingLeft:2}}>
          <div/>
          {states.map(s=>(
            <div key={s.id} style={{textAlign:'center',padding:'4px 0 6px',borderBottom:`2px solid ${stateColor(s.id)}44`}}>
              <div style={{fontSize:10.5,fontWeight:700,color:stateColor(s.id),letterSpacing:'.08em'}}>{s.label}</div>
              <div style={{fontSize:9,color:isCp?'rgba(230,230,222,.5)':'rgba(220,200,180,.55)',marginTop:2}}>{s.hint}</div>
            </div>))}
        </div>
        {/* rows */}
        {methods.map((m,ri)=>(
          <div key={m.id} style={{display:'grid',gridTemplateColumns:'88px repeat(3,1fr)',gap:6,alignItems:'stretch',
            borderTop:ri>0?`1px dashed ${isCp?'rgba(255,209,102,.12)':'rgba(200,95,88,.14)'}`:'none',padding:'2px 0'}}>
            {rowHeader(m)}
            {states.map(s=>(<div key={s.id}>{cell(m,s)}</div>))}
          </div>))}
        {/* footer key */}
        <div style={{marginTop:14,paddingTop:10,borderTop:`1px solid ${isCp?'rgba(255,209,102,.14)':'rgba(200,95,88,.16)'}`,display:'flex',flexWrap:'wrap',gap:16,fontSize:9.5,color:isCp?'rgba(230,230,222,.6)':'rgba(220,200,180,.62)',letterSpacing:'.02em'}}>
          <span><span style={{fontWeight:700,color:isCp?'#FFD166':'#F4A07A'}}>→</span> ray arrow · feed-forward aim</span>
          <span><span style={{fontWeight:700,color:isCp?'#FFD166':'#F4A07A'}}>◂ ▸</span> pinch calipers · mid-air</span>
          <span><span style={{fontWeight:700,color:isCp?'#FFD166':'#F4A07A'}}>○</span> touch ring · contact radius</span>
        </div>
      </div>);
  };
  return (
    <div style={{display:'flex',flexDirection:'column'}}>
      {/* tab bar */}
      <div style={{display:'flex',gap:4,padding:'10px 14px 0',background:'rgba(255,255,255,.02)',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
        {LABS.map(l=>(
          <button key={l.id} onClick={()=>setLab(l.id)} style={{padding:'5px 13px',borderRadius:'6px 6px 0 0',fontSize:12,fontWeight:lab===l.id?600:400,
            background:lab===l.id?bg:'transparent',border:'none',
            borderBottom:lab===l.id?`2px solid ${isCp?'#FFD166':'#C85F58'}`:'2px solid transparent',
            color:lab===l.id?'#E8E4DF':'rgba(255,255,255,.36)',cursor:'pointer',fontFamily:'DM Sans,sans-serif',transition:'all .15s'}}>{l.label}</button>))}
      </div>
      {/* desc */}
      <div style={{padding:'10px 14px',fontSize:12,color:'rgba(255,255,255,.62)',lineHeight:1.55,background:bg+'CC',borderBottom:'1px solid rgba(255,255,255,.05)'}}><span style={{fontWeight:600,color:'rgba(255,255,255,.82)'}}>{meta.modes}</span> · {meta.desc}</div>
      {/* content */}
      {lab==='selection'?<SelectionMatrix/>:
        <div style={{background:bg,padding:'24px 16px 20px',display:'flex',flexWrap:'wrap',gap:18,justifyContent:'center',alignItems:'flex-end',minHeight:190,borderRadius:'0 0 10px 10px'}}>
          {items.map(({label,el})=>(
            <div key={label} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,minWidth:95}}>
              <div style={{width:130,height:108,display:'flex',alignItems:'center',justifyContent:'center'}}>{el}</div>
              <div style={{fontSize:10.5,fontWeight:600,color:isCp?'rgba(230,230,222,.92)':'rgba(235,225,215,.88)',letterSpacing:'.05em',textTransform:'uppercase',textAlign:'center'}}>{label}</div>
            </div>))}
        </div>}
    </div>);
}

/* ─ Desktop UI ─ */
const DESKLABS=[
  {id:'selection',name:'Selection Lab',vr:true,ar:true,desc:'Target 0.28 · Confirm boost 0.15 · Haptics on · Audio off'},
  {id:'placement',name:'Placement Lab',vr:false,ar:true,desc:'Place objects on detected surfaces using hit test.'},
  {id:'locomotion',name:'Locomotion Lab',vr:true,ar:false,desc:'Right stick · Move 50.0 · Snap turn 50°'},
  {id:'manipulation',name:'Manipulation Lab',vr:true,ar:false,desc:'Docking · Proximity pinch · Integrated 6DOF'},
];
function DesktopUI({isCp}){
  const t=isCp?CP:WN;
  const [activeLab,setActiveLab]=useState('selection');
  const [hoverLab,setHoverLab]=useState(null);
  const [hoverVR,setHoverVR]=useState(false);
  const [hoverAR,setHoverAR]=useState(false);
  const [railOpen,setRailOpen]=useState(true);
  const [objSize,setObjSize]=useState(35);
  const [opacity,setOpacity]=useState(70);
  const [haptics,setHaptics]=useState(true);
  const [audio,setAudio]=useState(false);
  const [lightRef,setLightRef]=useState(false);
  const [themeOpen,setThemeOpen]=useState(false);
  const lab=DESKLABS.find(l=>l.id===activeLab);
  const vrDis=!lab.vr,arDis=!lab.ar;
  const Toggle=({on,onToggle})=>(
    <button onClick={onToggle} style={{width:34,height:20,borderRadius:10,background:on?t.accentPrimary:t.shellBorderSubtle,position:'relative',border:'none',cursor:'pointer',transition:'background .18s',flexShrink:0}}>
      <div style={{position:'absolute',top:2,left:on?16:2,width:16,height:16,borderRadius:8,background:'#fff',transition:'left .18s',boxShadow:'0 1px 4px rgba(0,0,0,.22)'}}/>
    </button>);
  const Num=({v,set,step=5,min=0,max=100})=>(
    <div style={{display:'flex',alignItems:'center',gap:4}}>
      <button onClick={()=>set(Math.max(min,v-step))} style={{width:24,height:24,borderRadius:5,border:`1px solid ${t.shellBorder}`,background:t.shellBg,color:t.shellText,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>−</button>
      <div style={{width:34,height:24,borderRadius:5,border:`1px solid ${t.shellBorder}`,background:t.shellBg,color:t.shellText,fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>{v}</div>
      <button onClick={()=>set(Math.min(max,v+step))} style={{width:24,height:24,borderRadius:5,border:`1px solid ${t.shellBorder}`,background:t.shellBg,color:t.shellText,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>+</button>
    </div>);
  return (
    <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'18px',fontFamily:'DM Sans,sans-serif'}}>
      {/* left panel */}
      <div style={{background:t.shellElevated,border:`1px solid ${t.shellBorder}`,borderRadius:12,padding:16,display:'flex',flexDirection:'column',gap:12,flex:'0 0 355px',boxShadow:'0 4px 20px rgba(0,0,0,.09)'}}>
        <div>
          <div style={{fontSize:16,fontWeight:600,color:t.shellText,letterSpacing:'-.02em'}}>WebXR Playground</div>
          <div style={{fontSize:12,color:t.shellMuted,marginTop:2}}>Pick a lab, then enter VR or AR.</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
          {DESKLABS.map(l=>(
            <button key={l.id}
              onMouseEnter={()=>setHoverLab(l.id)} onMouseLeave={()=>setHoverLab(null)}
              onClick={()=>setActiveLab(l.id)}
              style={{padding:'8px 10px',border:`1.5px solid ${l.id===activeLab?t.accentBorder:t.shellBorder}`,borderRadius:9,
                background:l.id===activeLab?t.accentSoft:hoverLab===l.id?t.shellSubtle:t.shellBg,
                color:t.shellText,fontSize:12.5,fontWeight:l.id===activeLab?600:400,cursor:'pointer',textAlign:'center',minHeight:38,transition:'all .12s'}}>{l.name}</button>))}
        </div>
        <div style={{background:t.shellSubtle,border:`1px solid ${t.shellBorderSubtle}`,borderRadius:9,padding:11}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}}>
            {lab.vr&&<span style={{display:'inline-flex',alignItems:'center',padding:'2px 7px',borderRadius:99,fontSize:10.5,fontWeight:600,border:`1px solid ${t.shellBorder}`,background:t.shellBg,color:t.shellText}}>VR</span>}
            {lab.ar&&<span style={{display:'inline-flex',alignItems:'center',padding:'2px 7px',borderRadius:99,fontSize:10.5,fontWeight:600,border:`1px solid ${t.shellBorder}`,background:t.shellBg,color:t.shellText}}>AR</span>}
          </div>
          <div style={{fontSize:12,color:t.shellMuted}}>{lab.desc}</div>
        </div>
        <div style={{display:'flex',gap:7}}>
          <button disabled={vrDis} onMouseEnter={()=>setHoverVR(true)} onMouseLeave={()=>setHoverVR(false)}
            style={{flex:1,minHeight:40,borderRadius:9,fontSize:13,fontWeight:600,border:`2px solid ${vrDis?t.shellBorderSubtle:t.accentBorder}`,

  );
  const Table=({headers,rows,mono=true,firstCol='bold'})=>(
    <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'DM Sans,sans-serif'}}>
      <thead>
        <tr style={{borderBottom:'1px solid rgba(255,255,255,.1)'}}>
          {headers.map((h,i)=>(<th key={i} style={{padding:'6px 10px',fontSize:9.5,fontWeight:600,color:'rgba(255,255,255,.42)',textAlign:'left',letterSpacing:'.08em',textTransform:'uppercase',verticalAlign:'bottom'}}>{h}</th>))}
        </tr>
      </thead>
      <tbody>
        {rows.map((r,ri)=>(
          <tr key={ri} style={{borderBottom:'1px solid rgba(255,255,255,.04)'}}>
            {r.map((c,ci)=>(
              <td key={ci} style={{padding:'8px 10px',fontSize:11.5,lineHeight:1.5,color:ci===0&&firstCol==='bold'?'#E8E4DF':'rgba(232,228,223,.82)',fontWeight:ci===0&&firstCol==='bold'?600:400,fontFamily:mono&&ci>0?'DM Mono,monospace':'DM Sans,sans-serif',verticalAlign:'top',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{c}</td>
            ))}
          </tr>
        ))}
      </tbody>
    </table>
  );
  const Swatch=({color,name,role})=>(
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
      <div style={{width:26,height:26,borderRadius:5,background:color,boxShadow:'inset 0 0 0 1px rgba(255,255,255,.1), 0 0 0 1px rgba(0,0,0,.2)',flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'#E8E4DF',lineHeight:1.3}}>{name}</div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.48)',marginTop:1}}>{role}</div>
      </div>
      <div style={{fontSize:10,color:'rgba(255,255,255,.38)',fontFamily:'DM Mono,monospace',textAlign:'right',whiteSpace:'nowrap'}}>{color}</div>
    </div>
  );
  const JSONBlock=({children,id})=>(
    <div style={{marginTop:14,position:'relative'}}>
      <div style={{position:'absolute',top:7,right:9,zIndex:2}}>
        <CopyBtn id={id} text={children} label="Copy"/>
      </div>
      <pre style={{margin:0,padding:'12px 14px',background:'#07090B',border:'1px solid rgba(255,255,255,.06)',borderRadius:6,fontSize:10.5,lineHeight:1.5,color:'#B8D4C4',fontFamily:'DM Mono,monospace',overflowX:'auto',maxHeight:320,overflowY:'auto'}}>{children}</pre>
    </div>
  );

  // Flatten palette into displayable swatch rows (per theme).
  const flattenSwatches=(theme)=>{
    const t=TOKENS_JSON[theme];
    const out=[];
    const push=(name,val,role)=>{if(typeof val==='string')out.push({name,color:val,role});};
    // orb states
    ['idle','targeted','confirmed'].forEach(s=>{
      push(`orb.${s}.base`,t.orb[s].base,`Target orb · ${s}`);
      if(t.orb[s].ring)push(`orb.${s}.ring`,t.orb[s].ring,`${s} ring · pulses`);
      if(t.orb[s].halo)push(`orb.${s}.halo`,t.orb[s].halo,`${s} halo · radial`);
    });
    // arch + frame
    push('arch.stone',t.palette.arch.stone,'Arch stone');
    push('arch.rim',t.palette.arch.rim,'Arch rim · rim-lit on WN');
    // affordance accents
    push('affordance.controllerRay',t.affordance.controllerRay,'Controller dashed ray');
    push('affordance.pinchCalipers',t.affordance.pinchCalipers,'Pinch caliper chevrons');
    push('affordance.touchRing',t.affordance.touchRing,'Touch contact ring');
    // HUD
    push('hud.accent',t.hud.accent,'HUD rim + accent');
    push('hud.text',t.hud.text,'HUD body text');
    push('hud.good',t.hud.good,'HUD "good" state');
    // shell
    push('shell.bg',t.shell.bg,'Shell background');
    push('shell.text',t.shell.text,'Shell body text');
    push('accent.primary',t.accent.primary,'Shell primary action');
    return out;
  };

  const typoRows=[
    ['typography.sans','"DM Sans", ui-sans-serif, system-ui, sans-serif','Body + UI · weights 300/400/500/600'],
    ['typography.mono','"DM Mono", ui-monospace, monospace','FPS counter, step numbers, tokens'],
    ['scale.hudFpsMin','16 px (bold)','Minimized FPS numeral'],
    ['scale.hudFpsExp','32 px (bold)','Expanded FPS numeral'],
    ['scale.sceneLabel','11 px (bold)','Orb labels in scene'],
    ['scale.stateTag','9.5 px (bold)','· TARGETING · / ✓ CONFIRMED'],
    ['hudDims.minimizedW','158 × 38 px (rounded 19)','HUD pill collapsed'],
    ['hudDims.expandedW','295 × 168+ px (rounded 13)','HUD panel expanded'],
  ];

  const glowRows=[
    ['cpArchRim','stroke 4 px, no shadow','Bright daytime — keep flat, no bloom'],
    ['wnArchRim','stroke 4 px · shadow blur 18 · alpha .5 rgba(200,95,88)','Ember ring; additive pass in engine'],
    ['wnPlatformEmber','stroke 2 px · shadow blur 10','Around stage base only'],
    ['hudBorder','stroke 1.4 px · shadow blur 7 @ accent','Outer glow; CSS box-shadow on HTML'],
    ['targetedOrb (WN)','shadow blur 12 @ ring color','CP targeted has no shadow — uses higher ring alpha instead'],
  ];

  const tokensStr=JSON.stringify(TOKENS_JSON,null,2);
  const materialsStr=JSON.stringify(MATERIALS.map(([name,dims,intent,cp,wn])=>({name,dims,intent,cp,wn})),null,2);
  const transitionsStr=JSON.stringify(TRANSITIONS.map(([trigger,property,timing,notes])=>({trigger,property,timing,notes})),null,2);
  const spatialChangesArr=SPATIAL_CHANGES.map(([lab,aspect,currentCode,designTarget,why])=>({lab,aspect,currentCode,designTarget,why}));
  const spatialStr=JSON.stringify({note:'Only intentional design overrides to the code. See src/config/labs.ts for the full spatial layout.',changes:spatialChangesArr},null,2);
  const fullStr=JSON.stringify({
    version:'0.2',
    scope:'Visual-first handoff. Spatial layout lives in src/config/labs.ts; only intentional overrides are listed under spatialChanges.',
    tokens:TOKENS_JSON,
    materials:MATERIALS.map(([name,dims,intent,cp,wn])=>({name,dims,intent,cp,wn})),
    transitions:TRANSITIONS.map(([trigger,property,timing,notes])=>({trigger,property,timing,notes})),
    spatialChanges:spatialChangesArr,
    engineNotes:ENGINE_NOTES,
  },null,2);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:13}}>
      {/* Intro */}
      <div style={{padding:'14px 18px',background:'rgba(255,209,102,.04)',border:'1px solid rgba(255,209,102,.12)',borderRadius:10}}>
        <div style={{fontSize:12.5,color:'#FFD166',marginBottom:5,fontWeight:600,letterSpacing:'.02em'}}>Handoff spec · v0.2 · visual-first</div>
        <div style={{fontSize:11.5,color:'rgba(232,228,223,.82)',lineHeight:1.6,maxWidth:900}}>
          Source of truth for the Cloud Park and Warm Night themes. Read top to bottom, then mirror values into runtime theme config. Units are <span style={{fontFamily:'DM Mono,monospace',color:'#FFD166'}}>meters</span> in world space; colors are sRGB (convert hex → linear for emissive intensity &gt; 1). Copy the JSON blocks directly — do not re-type. Missing a value? Raise before implementing; don't fill in from guesswork.
        </div>
        <div style={{marginTop:10,padding:'9px 12px',background:'rgba(47,175,198,.08)',border:'1px solid rgba(47,175,198,.2)',borderRadius:6,fontSize:11,color:'rgba(232,228,223,.85)',lineHeight:1.55}}>
          <span style={{fontWeight:700,color:'#6BC8D8'}}>Scope:</span> This handoff is visual-first — tokens, materials, motion. Spatial layout (positions, radii, Leva tunables) lives in <span style={{fontFamily:'DM Mono,monospace',color:'#FFD166'}}>src/config/labs.ts</span> + <span style={{fontFamily:'DM Mono,monospace',color:'#FFD166'}}>src/labs/*</span> and is the engineer's source of truth. Section 04 lists <em>only the intentional spatial changes</em> the design overrides in code; everything else stays as-is.
        </div>
      </div>

      {/* 1 · Tokens */}
      <Block num="01" title="Tokens · colors, type, dimensions" right={<CopyBtn id="t-json" text={tokensStr}/>}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,marginBottom:18}}>
          {['cloud-park','warm-night'].map(k=>(
            <div key={k}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:k==='cloud-park'?'#FFD166':'#C85F58'}}/>
                <div style={{fontSize:11,fontWeight:700,color:k==='cloud-park'?'#FFD166':'#C85F58',letterSpacing:'.08em',textTransform:'uppercase'}}>{TOKENS_JSON[k].meta.name}</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginLeft:4}}>{TOKENS_JSON[k].meta.mood}</div>
              </div>
              {flattenSwatches(k).map((s,i)=><Swatch key={i} {...s}/>)}
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.5)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>Typography &amp; dims</div>
            <Table headers={['token','value','notes']} rows={typoRows}/>
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.5)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>Glow recipes</div>
            <Table headers={['recipe','spec','notes']} rows={glowRows}/>
          </div>
        </div>
        <JSONBlock id="tokens-json-body">{tokensStr}</JSONBlock>
      </Block>

      {/* 2 · Materials */}
      <Block num="02" title="Materials · scene objects" right={<CopyBtn id="m-json" text={materialsStr}/>}>
        <div style={{fontSize:11,color:'rgba(255,255,255,.55)',marginBottom:8,lineHeight:1.5}}>
          One row per object × theme. "Intent" is the visual role; the per-theme columns give material recipe (base / emissive / roughness / ring / shadow). States use additive deltas from the idle row — see Transitions for timing.
        </div>
        <div style={{overflowX:'auto'}}>
          <Table headers={['Object','Dimensions','Intent','Cloud Park','Warm Night']} rows={MATERIALS}/>
        </div>
        <JSONBlock id="mat-json-body">{materialsStr}</JSONBlock>
      </Block>

      {/* 3 · Transitions */}
      <Block num="03" title="Transitions · state changes &amp; animations" right={<CopyBtn id="tr-json" text={transitionsStr}/>}>
        <Table headers={['Trigger','Property animated','Curve · Duration','Notes']} rows={TRANSITIONS}/>
        <JSONBlock id="tr-json-body">{transitionsStr}</JSONBlock>
      </Block>

      {/* 4 · Spatial changes (design overrides only) */}
      <Block num="04" title="Spatial changes · design overrides to src/config/labs.ts" right={<CopyBtn id="sp-json" text={spatialStr}/>}>
        <div style={{fontSize:11,color:'rgba(255,255,255,.6)',marginBottom:10,lineHeight:1.55,maxWidth:920}}>
          Only the intentional spatial deltas the design introduces. Everything else — target sizes, Leva ranges, snap-turn angle, Zen Garden mode, camera height — should stay as-is in <span style={{fontFamily:'DM Mono,monospace',color:'#FFD166'}}>src/config/labs.ts</span> / <span style={{fontFamily:'DM Mono,monospace',color:'#FFD166'}}>src/labs/*</span>. If a value isn't listed here, the engineer should not change it.
        </div>
        <div style={{overflowX:'auto'}}>
          <Table headers={['Lab','Aspect','Code today','Design target','Why']} rows={SPATIAL_CHANGES}/>
        </div>
        <div style={{marginTop:12,padding:'9px 12px',background:'rgba(255,255,255,.03)',border:'1px dashed rgba(255,255,255,.08)',borderRadius:6,fontSize:10.5,color:'rgba(255,255,255,.58)',lineHeight:1.6}}>
          <span style={{fontWeight:700,color:'rgba(255,255,255,.8)'}}>Explicitly unchanged from code:</span>{' '}
          snap-turn angle (<span style={{fontFamily:'DM Mono,monospace'}}>45°</span>) ·
          near-target size (<span style={{fontFamily:'DM Mono,monospace'}}>targetSize</span> default 0.28 m) ·
          crystal/key size (<span style={{fontFamily:'DM Mono,monospace'}}>objectSize</span> defaults) ·
          Manipulation Zen Garden mode (parallel dropdown option) ·
          camera / eye height (WebXR device default) ·
          collider vs visual radius (no separate collider today).
        </div>
        <JSONBlock id="sp-json-body">{spatialStr}</JSONBlock>
      </Block>

      {/* 5 · Engine notes */}
      <Block num="05" title="Engine notes · per lab">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {Object.entries(ENGINE_NOTES).map(([lab,note])=>(
            <div key={lab} style={{padding:'12px 14px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:7}}>
              <div style={{fontSize:11,fontWeight:700,color:'#FFD166',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:5}}>{lab}</div>
              <div style={{fontSize:11.5,color:'rgba(232,228,223,.85)',lineHeight:1.6}}>{note}</div>
            </div>
          ))}
        </div>
      </Block>

      {/* 6 · Full JSON */}
      <Block num="06" title="Full handoff bundle · one JSON" right={<CopyBtn id="full-json" text={fullStr} label="Copy full bundle"/>}>
        <div style={{fontSize:11,color:'rgba(255,255,255,.55)',marginBottom:8,lineHeight:1.5}}>
          Everything above, collapsed into a single copyable object. Use this as the import shape for a theme-registry module. Version-stamped so the engineer can detect drift.
        </div>
        <JSONBlock id="full-json-body">{fullStr}</JSONBlock>
      </Block>
    </div>
  );
}

/* ─ App shell ─ */
const SECTIONS=[
  {id:'vr',label:'VR World'},
  {id:'objects',label:'Scene Objects'},
  {id:'hud',label:'HUD Panel'},
  {id:'ar',label:'AR Mode'},
  {id:'desktop',label:'Desktop UI'},
  {id:'handoff',label:'Handoff'},
];
const VR_LABS=[
  {id:'selection',label:'Selection'},
  {id:'placement',label:'Placement'},
  {id:'locomotion',label:'Locomotion'},
  {id:'manipulation',label:'Manipulation'},
];

function ThemeCard({label,accent,children}){
  return (
    <div style={{borderRadius:10,border:'1.5px solid rgba(255,255,255,.07)',overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.22)'}}>
      <div style={{padding:'8px 13px',background:'rgba(255,255,255,.03)',borderBottom:'1px solid rgba(255,255,255,.05)',display:'flex',alignItems:'center',gap:7}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:accent}}/>
        <span style={{fontSize:12,fontWeight:600,color:'#BCBCBC'}}>{label}</span>
      </div>
      {children}
    </div>);
}

function App(){
  const [theme,setTheme]=useState(()=>localStorage.getItem('xrd2-theme')||'cloud-park');
  const [section,setSection]=useState(()=>localStorage.getItem('xrd2-section')||'vr');
  const [vrLab,setVrLab]=useState('selection');
  const [arLab,setArLab]=useState('selection');
  useEffect(()=>{localStorage.setItem('xrd2-theme',theme);},[theme]);
  useEffect(()=>{localStorage.setItem('xrd2-section',section);},[section]);
  const isCp=theme==='cloud-park';
  const navAcc=isCp?'#FFD166':'#C85F58';
  const navBg=isCp?'#14282C':'#110D09';

  const cpDraw=useCallback(c=>drawCPVR(c,vrLab),[vrLab]);
  const wnDraw=useCallback(c=>drawWNVR(c,vrLab),[vrLab]);
  const cpAR=useCallback(c=>drawCPAR(c,arLab),[arLab]);
  const wnAR=useCallback(c=>drawWNAR(c,arLab),[arLab]);

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* nav */}
      <div style={{background:navBg,borderBottom:'1px solid rgba(255,255,255,.06)',padding:'0 18px',display:'flex',alignItems:'center',gap:18,height:50,position:'sticky',top:0,zIndex:100,flexShrink:0}}>
        <div style={{fontSize:12.5,fontWeight:600,color:'rgba(255,255,255,.38)',whiteSpace:'nowrap'}}>XR Playground · Themes</div>
        <div style={{display:'flex',gap:1,background:'rgba(255,255,255,.07)',borderRadius:7,padding:3,flexShrink:0}}>
          {[['cloud-park','☁ Cloud Park','#244C54'],['warm-night','🌆 Warm Night','#4E2018']].map(([id,lbl,abg])=>(
            <button key={id} onClick={()=>setTheme(id)} style={{padding:'4px 12px',borderRadius:5,border:'none',cursor:'pointer',fontSize:12,fontWeight:theme===id?600:400,background:theme===id?abg:'transparent',color:theme===id?navAcc:'rgba(255,255,255,.38)',transition:'all .15s',fontFamily:'DM Sans,sans-serif'}}>{lbl}</button>))}
        </div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.22)',flexShrink:0}}>{isCp?'Painterly · pastel · Half+Half inspired':'Late-night city · amber glow · Fifth Element inspired'}</div>
        <div style={{display:'flex',gap:2,marginLeft:'auto'}}>
          {SECTIONS.map(s=>(
            <button key={s.id} onClick={()=>setSection(s.id)} style={{padding:'4px 11px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,background:section===s.id?navAcc+'22':'transparent',color:section===s.id?navAcc:'rgba(255,255,255,.34)',fontWeight:section===s.id?600:400,transition:'all .15s',fontFamily:'DM Sans,sans-serif'}}>{s.label}</button>))}
        </div>
      </div>

      <div style={{flex:1,background:'#080B0D',overflowY:'auto'}}>
        <div style={{padding:'18px',display:'flex',flexDirection:'column',gap:14,maxWidth:2200,margin:'0 auto'}}>

          {section==='vr'&&<>
            {/* lab picker */}
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <span style={{fontSize:11,color:'rgba(255,255,255,.28)',marginRight:4}}>Lab:</span>
              {VR_LABS.map(l=>(
                <button key={l.id} onClick={()=>setVrLab(l.id)} style={{padding:'4px 12px',borderRadius:6,border:`1px solid ${vrLab===l.id?navAcc+'88':'rgba(255,255,255,.1)'}`,background:vrLab===l.id?navAcc+'14':'transparent',color:vrLab===l.id?navAcc:'rgba(255,255,255,.4)',fontSize:12,fontWeight:vrLab===l.id?600:400,cursor:'pointer',transition:'all .15s',fontFamily:'DM Sans,sans-serif'}}>{l.label}</button>))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
              <ThemeCard label={`Cloud Park · ${VR_LABS.find(l=>l.id===vrLab).label} Lab · VR`} accent="#FFD166"><SceneCanvas drawFn={cpDraw}/></ThemeCard>
              <ThemeCard label={`Warm Night · ${VR_LABS.find(l=>l.id===vrLab).label} Lab · VR`} accent="#C85F58"><SceneCanvas drawFn={wnDraw}/></ThemeCard>
            </div>
          </>}

          {section==='objects'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
            <ThemeCard label="Cloud Park · Scene Objects" accent="#FFD166"><SceneObjectsSection isCp={true}/></ThemeCard>
            <ThemeCard label="Warm Night · Scene Objects" accent="#C85F58"><SceneObjectsSection isCp={false}/></ThemeCard>
          </div>}

          {section==='hud'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
            <ThemeCard label="Cloud Park · HUD Panel" accent="#FFD166"><HUDSection isCp={true}/></ThemeCard>
            <ThemeCard label="Warm Night · HUD Panel" accent="#C85F58"><HUDSection isCp={false}/></ThemeCard>
          </div>}

          {section==='ar'&&<>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <span style={{fontSize:11,color:'rgba(255,255,255,.28)',marginRight:4}}>Lab (AR-capable):</span>
              {[{id:'selection',label:'Selection'},{id:'placement',label:'Placement'}].map(l=>(
                <button key={l.id} onClick={()=>setArLab(l.id)} style={{padding:'4px 12px',borderRadius:6,border:`1px solid ${arLab===l.id?navAcc+'88':'rgba(255,255,255,.1)'}`,background:arLab===l.id?navAcc+'14':'transparent',color:arLab===l.id?navAcc:'rgba(255,255,255,.4)',fontSize:12,fontWeight:arLab===l.id?600:400,cursor:'pointer',transition:'all .15s',fontFamily:'DM Sans,sans-serif'}}>{l.label}</button>))}
              <span style={{fontSize:11,color:'rgba(255,255,255,.2)',marginLeft:8}}>(Locomotion & Manipulation are VR-only)</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
              <ThemeCard label={`Cloud Park · ${arLab==='selection'?'Selection':'Placement'} Lab · AR`} accent="#FFD166"><SceneCanvas drawFn={cpAR}/></ThemeCard>
              <ThemeCard label={`Warm Night · ${arLab==='selection'?'Selection':'Placement'} Lab · AR`} accent="#C85F58"><SceneCanvas drawFn={wnAR}/></ThemeCard>
            </div>
          </>}

          {section==='desktop'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
            <ThemeCard label="Cloud Park · Desktop UI" accent="#FFD166">
              <div style={{background:'#CAEADB'}}><DesktopUI isCp={true}/></div>
            </ThemeCard>
            <ThemeCard label="Warm Night · Desktop UI" accent="#C85F58">
              <div style={{background:'#E0D4CA'}}><DesktopUI isCp={false}/></div>
            </ThemeCard>
          </div>}

          {section==='handoff'&&<HandoffSection/>}

        </div>
      </div>
    </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

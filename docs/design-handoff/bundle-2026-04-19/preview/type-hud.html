<!DOCTYPE html>
<html lang="en" data-pg-theme="warm-night">
<head>
<meta charset="UTF-8">
<title>Type · HUD Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--pg-xr-void-clear); padding: 18px 22px; font-family: var(--pg-font-sans); color: var(--pg-xr-hud-text-primary); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--pg-font-mono); font-size: 10px; color: var(--pg-xr-hud-text-muted); width: 150px; flex-shrink: 0; letter-spacing: 0.02em; }
  .specimen { line-height: 1.1; color: var(--pg-xr-hud-text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">FPS expanded · 32</div>
    <div class="specimen" style="font-family: var(--pg-font-mono); font-size: 32px; color: #6f9e78;">89</div>
  </div>
  <div class="row">
    <div class="meta">FPS minimized · 16</div>
    <div class="specimen" style="font-family: var(--pg-font-mono); font-size: 16px; color: #6f9e78;">89</div>
  </div>
  <div class="row">
    <div class="meta">HUD metric · 13.5</div>
    <div class="specimen" style="font-family: var(--pg-font-mono); font-size: 13.5px; color: var(--pg-xr-hud-text-metric);">11.2 ms</div>
  </div>
  <div class="row">
    <div class="meta">HUD muted · 11</div>
    <div class="specimen" style="font-size: 11px; color: var(--pg-xr-hud-text-muted);">Trial 2 / 8 · Hand · Pinch</div>
  </div>
  <div class="row">
    <div class="meta">HUD label · 9</div>
    <div class="specimen" style="font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--pg-xr-hud-text-muted);">Playground HUD</div>
  </div>
  <div class="row">
    <div class="meta">Scene label · 11 / 0.12u</div>
    <div class="specimen" style="font-size: 12px; font-weight: 600; color: var(--pg-xr-hud-text-primary);">Selection Lab</div>
  </div>
</body>
</html>

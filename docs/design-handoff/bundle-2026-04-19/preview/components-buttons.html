<!DOCTYPE html>
<html lang="en" data-pg-theme="warm-night">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--pg-shell-bg-elevated); padding: 16px 18px; font-family: var(--pg-font-sans); color: var(--pg-shell-text-primary); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .h3 { font-size: 9.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--pg-shell-text-muted); margin: 0 0 6px; }
  button { font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 150ms cubic-bezier(0.4,0,0.2,1); }
  .pri { background: #B9564E; color: #FFF7EF; border: 1px solid #97463F; border-radius: 10px; padding: 12px 20px; }
  .pri-hover { background: #97463F; color: #FFF7EF; border: 1px solid #97463F; border-radius: 10px; padding: 12px 20px; }
  .pri-disabled { background: #E8D7CA; color: #6B5A50; border: 1px solid #D3BCAC; border-radius: 10px; padding: 12px 20px; cursor: not-allowed; }
  .ghost { background: transparent; color: #3A2820; border: 1px solid #B99B89; border-radius: 10px; padding: 10px 16px; }
  .ghost-hover { background: #FBF7EF; color: #3A2820; border: 1px solid #D3BCAC; border-radius: 10px; padding: 10px 16px; }
  .chip-active { background: rgba(185, 86, 78, 0.15); color: #3A2820; border: 1px solid #B9564E; border-radius: 10px; padding: 10px 14px; font-weight: 600; }
  .chip-inactive { background: #E8D7CA; color: #3A2820; border: 1px solid #B99B89; border-radius: 10px; padding: 10px 14px; }
  .focus-demo { background: #B9564E; color: #FFF7EF; border: 1px solid #97463F; border-radius: 10px; padding: 12px 20px; outline: 2px solid #B9564E; outline-offset: 2px; }
</style>
</head>
<body>
  <div class="h3">Primary · ghost · disabled</div>
  <div class="row">
    <button class="pri">Enter VR</button>
    <button class="pri-hover">Hover</button>
    <button class="pri-disabled">Disabled</button>
    <button class="ghost">Enter AR</button>
    <button class="ghost-hover">Ghost · hover</button>
    <button class="focus-demo">Focused</button>
  </div>
  <div class="h3">Lab chips · active vs inactive</div>
  <div class="row">
    <button class="chip-active">Selection Lab</button>
    <button class="chip-inactive">Placement Lab</button>
    <button class="chip-inactive">Locomotion Lab</button>
    <button class="chip-inactive">Manipulation Lab</button>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XR Session Logs Viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b0f16;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .top {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 14px;
      }
      .muted {
        color: #94a3b8;
        font-size: 13px;
      }
      button {
        background: #1f2937;
        color: #e5e7eb;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }
      button:hover {
        background: #243041;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border: 1px solid #374151;
        border-radius: 999px;
        font-size: 12px;
        color: #cbd5e1;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #0f172a;
        border: 1px solid #1e293b;
      }
      th, td {
        border-bottom: 1px solid #1e293b;
        text-align: left;
        vertical-align: top;
        padding: 10px;
        font-size: 13px;
      }
      th {
        color: #93c5fd;
        font-weight: 600;
        background: #0b1220;
      }
      .empty {
        border: 1px dashed #334155;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
        color: #94a3b8;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>XR Session Logs Viewer</h2>
      <p class="muted">Reads data from <code>/api/logs</code> written by the logger panel.</p>

      <div class="top">
        <button id="refreshBtn">Refresh</button>
        <button id="downloadBtn">Download JSON</button>
        <span class="pill" id="countPill">Entries: 0</span>
      </div>

      <div class="muted" id="meta"></div>
      <div style="height: 10px"></div>
      <div id="tableMount"></div>
    </div>

    <script>
      let lastPayload = { entries: [], updatedAt: null, path: null }

      // Build rows with DOM APIs (textContent) so any string the server returns
      // is treated as text, never HTML. Previously this used innerHTML with raw
      // template interpolation, which let an attacker who could write to
      // /api/logs (eg. via CSRF) stage stored XSS that ran in the dev origin.
      function renderTable(entries) {
        const mount = document.getElementById('tableMount')
        mount.replaceChildren()

        if (!entries.length) {
          const empty = document.createElement('div')
          empty.className = 'empty'
          empty.textContent = 'No log entries yet. Use the in-app Session Logger to add notes.'
          mount.appendChild(empty)
          return
        }

        const table = document.createElement('table')

        const thead = document.createElement('thead')
        const headRow = document.createElement('tr')
        const headers = [
          ['Timestamp', '220px'],
          ['Lab', '120px'],
          ['Mode', '140px'],
          ['Input', '120px'],
          ['Note', null],
        ]
        for (const [label, width] of headers) {
          const th = document.createElement('th')
          if (width) th.style.width = width
          th.textContent = label
          headRow.appendChild(th)
        }
        thead.appendChild(headRow)
        table.appendChild(thead)

        const tbody = document.createElement('tbody')
        for (const entry of entries.slice().reverse()) {
          const tr = document.createElement('tr')

          const tsCell = document.createElement('td')
          const tsCode = document.createElement('code')
          tsCode.textContent = entry.timestamp ?? ''
          tsCell.appendChild(tsCode)
          tr.appendChild(tsCell)

          for (const value of [entry.labId, entry.mode, entry.inputSource, entry.note]) {
            const td = document.createElement('td')
            td.textContent = value == null ? '' : String(value)
            tr.appendChild(td)
          }

          tbody.appendChild(tr)
        }
        table.appendChild(tbody)
        mount.appendChild(table)
      }

      async function refresh() {
        const countPill = document.getElementById('countPill')
        const meta = document.getElementById('meta')
        try {
          const res = await fetch('/api/logs', { cache: 'no-store' })
          const json = await res.json()
          if (!res.ok || !json.ok) {
            throw new Error(json.error || `HTTP ${res.status}`)
          }
          const entries = Array.isArray(json.entries) ? json.entries : []
          lastPayload = { ...json, entries }
          countPill.textContent = `Entries: ${entries.length}`
          meta.textContent = `Updated: ${json.updatedAt || '-'} | File: ${json.path || '-'}`
          renderTable(entries)
        } catch (err) {
          countPill.textContent = 'Entries: ?'
          meta.textContent = `Failed to load logs: ${err instanceof Error ? err.message : 'unknown error'}`
          renderTable([])
        }
      }

      function downloadJson() {
        const blob = new Blob([JSON.stringify(lastPayload, null, 2)], { type: 'application/json' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = `xr-session-notes-view-${Date.now()}.json`
        a.click()
        URL.revokeObjectURL(url)
      }

      document.getElementById('refreshBtn').addEventListener('click', refresh)
      document.getElementById('downloadBtn').addEventListener('click', downloadJson)
      refresh()
    </script>
  </body>
  </html>
